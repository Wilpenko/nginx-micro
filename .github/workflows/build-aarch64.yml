name: Build nginx-micro aarch64

on:
  workflow_dispatch:    # 允许手动点一下运行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install aarch64 cross compiler
        run: |
          sudo apt update
          sudo apt install -y gcc-aarch64-linux-gnu make perl

      - name: Build nginx-micro for aarch64
        run: |
          make CC=aarch64-linux-gnu-gcc
          ls -lh nginx-micro

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nginx-micro-aarch64
          path: nginx-micro
